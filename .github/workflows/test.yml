# Runs the core quality gate for every push and pull request.
# This workflow verifies types, tests, build output, and npm package shape.
name: Test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Typecheck, test, build, and pack
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Validate npm package contents
        run: npm run pack:check
